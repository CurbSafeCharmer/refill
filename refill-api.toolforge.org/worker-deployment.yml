#          name: wmcs-project
#          readOnly: true
#        - mountPath: /data/scratch/
#          name: scratch
        workingDir: /data/project/refill-api/
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      securityContext: {}
      terminationGracePeriodSeconds: 30
