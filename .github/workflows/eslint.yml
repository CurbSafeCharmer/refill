name: JavaScript Linter

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  eslint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x

    - name: Build
      working-directory: ./refill.toolforge.org/public_html
      run: |
        npm ci
        npm test
        npm run build
