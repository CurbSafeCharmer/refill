name: Python Flask app

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # actions/setup-python doesn't support 3.7
        # TODO: add back 3.11, 3.13 later
        python: ["3.9"]

    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python }}
      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip setuptools wheel
          .venv/bin/python -m pip install tox
          .venv/bin/python -m pip install -r backend/requirements.txt
      # tox is a test suite, but it's configured just to lint. see tox.ini. it lints with the libraries black and isort.
      - name: Run application
        run: |
          # verify pkg_resources is available (pywikibot depends on it)
          .venv/bin/python -c "import pkg_resources; print('pkg_resources ok')"
          .venv/bin/python backend/app.py
