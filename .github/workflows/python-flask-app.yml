name: Python Flask app

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # actions/setup-python doesn't support 3.7
        # TODO: add back 3.11, 3.13 later
        python: ["3.9"]

    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python }}
      - name: Create venv and install deps
        run: |
          # Create venv and install/upgrade pip and setuptools into it
          python -m venv --upgrade-deps .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install tox
          .venv/bin/python -m pip install -r backend/requirements.txt
          # diagnostics: show setuptools presence
          .venv/bin/python -m pip show setuptools || true
          .venv/bin/python -m pip list
      - name: Diagnostic: show python internals
        run: |
          echo "--- which python ---"
          .venv/bin/python -c "import sys; print(sys.executable)"
          echo "--- sys.path ---"
          .venv/bin/python -c "import sys; print('\n'.join(sys.path))"
          echo "--- site.getsitepackages() ---"
          .venv/bin/python -c "import site, pprint; pprint.pprint(site.getsitepackages())"
          echo "--- find pkg_resources spec ---"
          .venv/bin/python - <<'PY'
import importlib.util, pprint, sys
spec = importlib.util.find_spec('pkg_resources')
pprint.pprint(spec)
print('PYTHONPATH=' + (os.environ.get('PYTHONPATH') or ''))
import os
sp = os.path.join(os.getcwd(), '.venv', 'lib')
print('site lib dir listing:')
import glob
print('\n'.join(glob.glob(os.path.join(sp, '**', 'pkg*'), recursive=True)[:50]))
PY
      - name: Run application
        run: |
          .venv/bin/python backend/app.py
